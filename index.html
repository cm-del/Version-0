<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>مزرعة دواجن - احترافي</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1b4332">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
  <div id="offlineBar" class="offline-bar">أنت غير متصل بالإنترنت</div>
  <div id="alertBar" class="alert-bar" style="display:none"></div>

  <div class="app-container">
    <main id="mainContent" class="main-content"></main>

    <nav class="bottom-nav">
      <button class="nav-btn active" data-tab="dashboard">🏠 الرئيسية</button>
      <button class="nav-btn" data-tab="warehouse">🏭 المخزن</button>
      <button class="nav-btn" data-tab="loans">💰 السلف</button>
      <button class="nav-btn" data-tab="charts">📊 الرسوم</button>
      <button class="nav-btn" data-tab="more">⚙️ المزيد</button>
    </nav>
  </div>

  <!-- القوالب المخفية -->
  <div style="display:none" id="templates">
    <!-- اللوحة الرئيسية -->
    <div id="dashboardTemplate">
      <div id="dashboardContent"></div>
      <button class="btn-block" onclick="showDailyEntry()" style="margin-top:15px">📋 تسجيل يومي</button>
    </div>

    <!-- نموذج السجل اليومي -->
    <div id="dailyEntryTemplate" style="display:none;">
      <button class="text-btn" onclick="showDashboard()">⬅ رجوع للرئيسية</button>
      <div class="house-panel">
        <select id="houseSelect"></select>
        <button class="icon-btn" onclick="addHouse()">➕</button>
      </div>
      <div class="cycle-panel">
        <label>الدورة:</label>
        <select id="cycleSelect"></select>
        <button class="icon-btn" onclick="editCycleDate()">📅</button>
      </div>
      <div id="houseInfo" class="info-box"></div>
      <hr>
      <form id="dailyForm">
        <input type="hidden" id="editingId">
        <label for="date">التاريخ</label>
        <input type="date" id="date" required>
        <label for="feedType">نوع العلف</label>
        <select id="feedType" required>
          <option value="starter">بادي</option>
          <option value="grower">نامي</option>
          <option value="finisher">ناهي</option>
        </select>
        <small id="feedStockHint"></small>
        <label for="feedBags">عدد الشكاير</label>
        <input type="number" id="feedBags" step="any" value="0" min="0" required>
        <small id="feedEstimateHint"></small>
        <label for="dead">النافق اليوم</label>
        <input type="number" id="dead" value="0" min="0">
        <label for="medications">الأدوية</label>
        <input type="text" id="medications" placeholder="أسماء الأدوية">
        <label for="expenses">مصروفات (ج.م)</label>
        <input type="number" id="expenses" step="any" value="0">
        <label for="weight">متوسط الوزن (جرام)</label>
        <input type="number" id="weight" step="any" placeholder="مثال: 2100">
        <label for="mortalityNotes">ملاحظات النافق</label>
        <textarea id="mortalityNotes" rows="2" placeholder="سبب النافق..."></textarea>
        <button type="submit" id="formSubmitBtn">💾 حفظ</button>
        <button type="button" id="cancelEditBtn" class="secondary" style="display:none" onclick="cancelEdit()">إلغاء</button>
      </form>
      <div class="table-header">
        <h3>سجلات <span id="currentHouseTitle"></span></h3>
        <button class="text-btn" onclick="toggleColumnPicker()">⚙️ أعمدة</button>
      </div>
      <div class="table-responsive">
        <table id="recordsTable"><thead id="recordsTableHead"></thead><tbody id="tableBody"></tbody></table>
      </div>
      <div class="performance-box"><h4>📈 مؤشرات</h4><div id="performanceContent"></div></div>
    </div>

    <!-- المخزن -->
    <div id="warehouseTemplate">
      <h2>🏭 مخزن الأعلاف</h2>
      <div id="warehouseStock"></div>
      <hr>
      <form id="warehouseForm">
        <label for="whType">نوع العلف</label>
        <select id="whType"><option value="starter">بادي</option><option value="grower">نامي</option><option value="finisher">ناهي</option></select>
        <label for="whBags">عدد الشكاير</label>
        <input type="number" id="whBags" min="1" value="1" required>
        <button type="submit">➕ إضافة للمخزن</button>
      </form>
    </div>

    <!-- السلف -->
    <div id="loansTemplate">
      <h2>💰 سلف أسبوعية</h2>
      <form id="loanForm">
        <input type="hidden" id="editingLoanId">
        <label for="loanDate">التاريخ</label><input type="date" id="loanDate" required>
        <label for="loanPerson">اسم الشخص</label><input type="text" id="loanPerson" required>
        <label for="loanAmount">المبلغ (ج.م)</label><input type="number" id="loanAmount" step="any" required>
        <button type="submit" id="loanSubmitBtn">💾 حفظ</button>
        <button type="button" id="cancelLoanEditBtn" class="secondary" style="display:none" onclick="cancelLoanEdit()">إلغاء</button>
      </form>
      <h3>جميع السلفات</h3>
      <table id="loansTable"><thead><tr><th>التاريخ</th><th>الشخص</th><th>المبلغ</th><th>تعديل</th><th>حذف</th></tr></thead><tbody id="loansBody"></tbody></table>
    </div>

    <!-- الرسوم البيانية -->
    <div id="chartsTemplate">
      <h2>📊 الرسوم البيانية</h2>
      <div class="chart-controls">
        <label>العنبر:</label>
        <select id="chartHouseSelect"></select>
        <div id="cycleComparison">
          <label>الدورة 1:</label><select id="cycle1Select"></select>
          <label>الدورة 2 (اختياري):</label><select id="cycle2Select"><option value="">لا مقارنة</option></select>
        </div>
        <label for="chartType">نوع الرسم:</label>
        <select id="chartType"><option value="weight">الوزن</option><option value="dead">النافق</option><option value="feed">العلف (كجم)</option></select>
      </div>
      <canvas id="myChart" width="300" height="200"></canvas>
    </div>

    <!-- المزيد -->
    <div id="moreTemplate">
      <h2>⚙️ الإعدادات والبيانات</h2>
      <button class="btn-block" onclick="exportAllData()">💾 تصدير كل البيانات</button>
      <button class="btn-block" onclick="document.getElementById('importFile').click()">📂 استيراد بيانات</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importAllData(event)">
      <button class="btn-block" onclick="showQRExport()">📱 مشاركة عبر QR</button>
      <button class="btn-block" onclick="startQRImport()">📷 مسح QR لاستيراد</button>
      <div id="qrContainer" style="text-align:center;margin-top:10px;"></div>
      <div id="reader" style="width:300px;margin:10px auto;"></div>
      <hr>
      <button class="btn-block danger" onclick="clearAllData()">🗑️ مسح جميع البيانات</button>
      <button class="btn-block" id="installBtn" style="display:none" onclick="installApp()">📲 تثبيت التطبيق</button>
    </div>
  </div>

  <!-- نافذة اختيار الأعمدة -->
  <div id="columnPickerModal" class="modal" style="display:none">
    <div class="modal-content">
      <h3>اختر الأعمدة</h3>
      <div id="columnChecks"></div>
      <button class="btn-block" onclick="applyColumns()">تم</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="script.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
    }
  </script>
</body>
</html>
