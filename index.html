<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>مزرعة - احترافي</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2c3e50">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    .app-logo { width: 44px; height: 44px; vertical-align: middle; margin-left: 8px; }
  </style>
</head>
<body>
  <div id="offlineBar" class="offline-bar">أنت غير متصل</div>
  <div id="alertBar" class="alert-bar" style="display:none"></div>
  <div id="pinScreen" class="pin-screen" style="display:none">
    <h2>🔐 أدخل الرمز</h2>
    <input type="password" id="pinInput" maxlength="4" inputmode="numeric" pattern="[0-9]*">
    <button onclick="submitPin()">دخول</button>
    <p id="pinError" style="color:red;display:none">رمز خاطئ</p>
  </div>

  <div class="app-container" id="appContainer" style="display:none">
    <header style="text-align:center;padding:12px 0 8px;">
      <svg class="app-logo" viewBox="0 0 64 64" fill="none">
        <circle cx="32" cy="32" r="30" fill="#2c3e50"/>
        <path d="M20 32c0-6 8-12 12-12s12 6 12 12-8 12-12 12-12-6-12-12z" fill="#ecf0f1"/>
        <circle cx="28" cy="30" r="2" fill="#2c3e50"/>
        <circle cx="36" cy="30" r="2" fill="#2c3e50"/>
        <path d="M26 36c2 2 6 2 8 0" stroke="#2c3e50" stroke-width="2" stroke-linecap="round"/>
        <path d="M38 24l6-4" stroke="#ecf0f1" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <h1 style="display:inline;color:#2c3e50;font-size:1.4rem;">مزرعة دواجن</h1>
    </header>
    <main id="mainContent" class="main-content"></main>

    <nav class="bottom-nav">
      <button class="nav-btn active" data-tab="dashboard">🏠 الرئيسية</button>
      <button class="nav-btn" data-tab="warehouse">🏭 المخزن</button>
      <button class="nav-btn" data-tab="loans">💰 السلف</button>
      <button class="nav-btn" data-tab="analytics">📈 تحليلات</button>
      <button class="nav-btn" data-tab="more">⚙️ المزيد</button>
    </nav>
  </div>

  <!-- القوالب -->
  <div style="display:none" id="templates">
    <!-- اللوحة الرئيسية -->
    <div id="dashboardTemplate">
      <div id="weatherWidget" style="text-align:center;margin-bottom:10px;font-size:0.9rem;"></div>
      <div id="dashboardContent"></div>
      <button class="btn-block" onclick="showDailyEntry()" style="margin-top:15px">📋 تسجيل يومي</button>
    </div>

    <!-- نموذج السجل اليومي -->
    <div id="dailyEntryTemplate" style="display:none;">
      <button class="text-btn" onclick="showDashboard()">⬅ رجوع</button>
      <div class="house-panel">
        <select id="houseSelect"></select>
        <button class="icon-btn" onclick="addHouse()">➕</button>
        <button class="icon-btn" onclick="editHouse()">✏️</button>
        <button class="icon-btn danger" onclick="deleteHouse()">🗑️</button>
      </div>
      <div class="cycle-panel">
        <label>الدورة:</label>
        <select id="cycleSelect"></select>
        <button class="icon-btn" onclick="editCycleDate()">📅</button>
      </div>
      <div id="houseInfo" class="info-box"></div>
      <hr>
      <form id="dailyForm">
        <input type="hidden" id="editingId">
        <div style="display:flex;justify-content:flex-end;margin-bottom:5px">
          <button type="button" class="icon-btn" onclick="startVoiceInput()" title="إدخال صوتي">🎤</button>
          <button type="button" class="icon-btn" onclick="startBarcodeScan('feedType')" title="مسح باركود">📷</button>
        </div>
        <label for="date">التاريخ</label>
        <input type="date" id="date" required>
        <label for="feedType">نوع العلف</label>
        <select id="feedType" required>
          <option value="starter">بادي</option>
          <option value="grower">نامي</option>
          <option value="finisher">ناهي</option>
        </select>
        <small id="feedStockHint"></small>
        <label for="feedBags">عدد الشكاير</label>
        <input type="number" id="feedBags" step="any" value="0" min="0" required>
        <small id="feedEstimateHint"></small>
        <label for="dead">النافق اليوم</label>
        <input type="number" id="dead" value="0" min="0">
        <label for="medications">الأدوية</label>
        <input type="text" id="medications">
        <label for="expenses">مصروفات (ج.م)</label>
        <input type="number" id="expenses" step="any" value="0">
        <label for="weight">متوسط الوزن (جرام)</label>
        <input type="number" id="weight" step="any">
        <label for="mortalityNotes">ملاحظات النافق</label>
        <textarea id="mortalityNotes" rows="2"></textarea>
        <button type="submit" id="formSubmitBtn">💾 حفظ</button>
        <button type="button" id="cancelEditBtn" class="secondary" style="display:none" onclick="cancelEdit()">إلغاء</button>
      </form>
      <div class="table-header">
        <h3>سجلات <span id="currentHouseTitle"></span></h3>
        <div>
          <button class="text-btn" onclick="exportTableCSV()">📥 CSV</button>
          <button class="text-btn" onclick="exportTablePDF()">📄 PDF</button>
          <button class="text-btn" onclick="shareWhatsApp()">💬 واتساب</button>
          <button class="text-btn" onclick="toggleColumnPicker()">⚙️ أعمدة</button>
        </div>
      </div>
      <div class="table-responsive">
        <table id="recordsTable"><thead id="recordsTableHead"></thead><tbody id="tableBody"></tbody></table>
      </div>
      <div class="performance-box"><h4>📈 مؤشرات</h4><div id="performanceContent"></div></div>
    </div>

    <!-- المخزن -->
    <div id="warehouseTemplate">
      <h2>🏭 مخزن الأعلاف</h2>
      <div id="warehouseStock"></div>
      <button class="icon-btn" onclick="startBarcodeScan('whType')">📷 مسح باركود</button>
      <hr>
      <form id="warehouseForm">
        <label for="whType">نوع العلف</label>
        <select id="whType">
          <option value="starter">بادي</option>
          <option value="grower">نامي</option>
          <option value="finisher">ناهي</option>
        </select>
        <label for="whBags">عدد الشكاير</label>
        <input type="number" id="whBags" min="1" value="1" required>
        <button type="submit">➕ إضافة للمخزن</button>
      </form>
    </div>

    <!-- السلف -->
    <div id="loansTemplate">
      <h2>💰 سلف أسبوعية</h2>
      <form id="loanForm">
        <input type="hidden" id="editingLoanId">
        <label for="loanDate">التاريخ</label><input type="date" id="loanDate" required>
        <label for="loanPerson">اسم الشخص</label><input type="text" id="loanPerson" required>
        <label for="loanAmount">المبلغ (ج.م)</label><input type="number" id="loanAmount" step="any" required>
        <button type="submit" id="loanSubmitBtn">💾 حفظ</button>
        <button type="button" id="cancelLoanEditBtn" class="secondary" style="display:none" onclick="cancelLoanEdit()">إلغاء</button>
      </form>
      <h3>جميع السلفات</h3>
      <table id="loansTable"><thead><tr><th>التاريخ</th><th>الشخص</th><th>المبلغ</th><th>تعديل</th><th>حذف</th></tr></thead><tbody id="loansBody"></tbody></table>
    </div>

    <!-- تحليلات -->
    <div id="analyticsTemplate">
      <h2>📈 تحليلات متقدمة</h2>
      <div id="analyticsContent">اختر عنبراً ودورة</div>
    </div>

    <!-- المزيد (الإعدادات + الميزات) -->
    <div id="moreTemplate">
      <h2>⚙️ الإعدادات والميزات</h2>
      <button class="btn-block" onclick="setupPin()">🔐 تغيير رمز PIN</button>
      <button class="btn-block" onclick="startOCR()">📄 OCR مسح فاتورة</button>
      <button class="btn-block" onclick="startSync()">🔄 مزامنة مع جهاز آخر</button>
      <hr>
      <button class="btn-block" onclick="exportAllData()">💾 تصدير كل البيانات</button>
      <button class="btn-block" onclick="document.getElementById('importFile').click()">📂 استيراد بيانات</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importAllData(event)">
      <button class="btn-block" onclick="showQRExport()">📱 مشاركة عبر QR</button>
      <button class="btn-block" onclick="startQRImport()">📷 مسح QR لاستيراد</button>
      <div id="qrContainer" style="text-align:center;margin-top:10px;"></div>
      <div id="reader" style="width:300px;margin:10px auto;"></div>
      <hr>
      <div id="syncStatus" style="margin:10px 0"></div>
      <button class="btn-block danger" onclick="clearAllData()">🗑️ مسح جميع البيانات</button>
      <button class="btn-block" id="installBtn" style="display:none" onclick="installApp()">📲 تثبيت التطبيق</button>
    </div>

    <!-- الجدول الزمني -->
    <div id="timelineTemplate">
      <h2>⏳ الجدول الزمني للدورة</h2>
      <div id="timelineContent"></div>
    </div>
  </div>

  <!-- نافذة اختيار الأعمدة -->
  <div id="columnPickerModal" class="modal" style="display:none">
    <div class="modal-content">
      <h3>اختر الأعمدة</h3>
      <div id="columnChecks"></div>
      <button class="btn-block" onclick="applyColumns()">تم</button>
    </div>
  </div>

  <!-- نافذة التقويم المخصص -->
  <div id="datePickerModal" class="modal" style="display:none">
    <div class="modal-content date-picker-content">
      <div class="date-picker-header">
        <button class="icon-btn" id="prevMonth">◀</button>
        <span id="monthYearDisplay"></span>
        <button class="icon-btn" id="nextMonth">▶</button>
      </div>
      <div class="date-picker-grid" id="dateGrid"></div>
      <div class="date-picker-actions">
        <button id="clearDateBtn" class="secondary">إلغاء</button>
        <button id="confirmDateBtn">تأكيد</button>
      </div>
    </div>
  </div>

  <!-- OCR result -->
  <div id="ocrModal" class="modal" style="display:none">
    <div class="modal-content">
      <h3>نتيجة OCR</h3>
      <textarea id="ocrText" rows="5" style="width:100%"></textarea>
      <button onclick="parseOCRText()">استخراج البيانات</button>
      <button class="secondary" onclick="document.getElementById('ocrModal').style.display='none'">إغلاق</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@2/dist/tesseract.min.js"></script>
  <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
  <script src="script.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js');
        Notification.requestPermission();
      });
    }
  </script>
</body>
</html>
